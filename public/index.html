<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8">
    <title>Welkom bij TuinMaat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            background-color: #F5F5DC; /* ZachtBeige uit je app */
            color: #2E7D32; /* DonkerGroen uit je app */
            line-height: 1.6;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .logo { margin-bottom: 20px; }
        .logo img { width: 100px; height: 100px; border-radius: 50%; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; font-weight: bold; margin-top: 0; }
        p { font-size: 16px; color: #555; }
        .button {
            display: inline-block;
            padding: 16px 32px;
            background-color: #2E7D32;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            margin-top: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .footer { margin-top: 50px; font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="logo.png" alt="TuinMaat Logo">
        </div>
        <h1>TuinMaat</h1>
        <p>Je bent uitgenodigd om samen te werken in een tuin!</p>

        <div id="status">
            <p>De app wordt nu geopend op je telefoon...</p>
        </div>

        <div id="manual-links" style="display:none;">
            <p>Heb je de app nog niet? Download hem hieronder:</p>
            <a href="https://play.google.com/store/apps/details?id=com.rvodevelopment.tuinmaat" class="button">Google Play Store</a>
            <br>
            <a href="https://apps.apple.com/app/id6770014783" id="apple-link" class="button" style="background-color: #000;">Apple App Store</a>
        </div>

        <div class="footer">
            &copy; 2024 TuinMaat - rvodevelopment.nl
        </div>
    </div>

    <script>
        // Detectie van apparaat
        var userAgent = navigator.userAgent || navigator.vendor || window.opera;
        var isAndroid = /android/i.test(userAgent);
        var isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;

        // Als de app niet binnen 3 seconden opent, tonen we de download knoppen
        setTimeout(function() {
            document.getElementById('status').style.display = 'none';
            document.getElementById('manual-links').style.display = 'block';

            // Optioneel: Automatisch doorsturen naar de juiste store
            if (isAndroid) {
                // window.location.href = "https://play.google.com/store/apps/details?id=com.rvodevelopment.tuinmaat";
            }
        }, 3000);

        // Pas de Apple link aan
        document.getElementById('apple-link').href = "https://apps.apple.com/app/id6770014783";
    </script>
</body>
</html>
