name: iOS Build & Test

on:
  workflow_dispatch:
  push:
    branches: [ "main", "develop", "alpha-version", "master" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        architecture: aarch64
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build Framework
      run: |
        export GRADLE_OPTS="-Dorg.gradle.native=false -Dorg.gradle.daemon=false"
        ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 -PskipAndroidApp=true

    - name: Build iOS App (Simple Build)
      run: |
        # Zoek het framework
        FRAMEWORK_DIR=$(find composeApp/build/bin/iosSimulatorArm64 -name "debugFramework" -type d | head -n 1)
        
        # Voer een standaard build uit, geen archive
        xcodebuild -project iosApp/iosApp.xcodeproj \
                   -scheme iosApp \
                   -sdk iphonesimulator \
                   -configuration Debug \
                   -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
                   build \
                   CODE_SIGNING_ALLOWED=NO \
                   FRAMEWORK_SEARCH_PATHS="$(pwd)/$FRAMEWORK_DIR" \
                   OTHER_LDFLAGS="-framework ComposeApp -Wl,-undefined,dynamic_lookup"

    - name: Prepare Artifact
      run: |
        # Pak de .app map uit de DerivedData map
        mkdir -p Payload
        cp -R $(find build -name "iosApp.app") Payload/
        zip -r ios-app.zip Payload

    - name: Upload iOS App Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-app-debug
        path: ios-app.zip
