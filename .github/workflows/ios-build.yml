name: iOS Build & Test

on:
  workflow_dispatch:
  push:
    branches: [ "main", "develop", "alpha-version", "master" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        architecture: aarch64
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Run Unit Tests (Android Context)
      run: |
        # We draaien de common logic tests op de Android target. 
        # Dit test de gedeelde AI-logica zonder de iOS-linker problemen.
        ./gradlew :composeApp:testDebugUnitTest

    - name: Create local.properties
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties
        echo "PLANTNET_API_KEY=${{ secrets.PLANTNET_API_KEY }}" >> local.properties

    - name: Setup Firebase iOS Config
      run: |
        mkdir -p iosApp/iosApp/Preview\ Content
        mkdir -p iosApp/Configuration
        echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" > iosApp/iosApp/GoogleService-Info.plist

    - name: Build Framework (Static)
      run: |
        export GRADLE_OPTS="-Dorg.gradle.native=false -Dorg.gradle.daemon=false"
        ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 -PskipAndroidApp=true --info

    - name: Build iOS App (Ignore Firebase for Test)
      run: |
        FRAMEWORK_DIR=$(find composeApp/build/bin/iosSimulatorArm64 -name "debugFramework" -type d | head -n 1)
        FULL_PATH="$(pwd)/$FRAMEWORK_DIR"
        
        xcodebuild -project iosApp/iosApp.xcodeproj \
                   -scheme iosApp \
                   -sdk iphonesimulator \
                   -configuration Debug \
                   -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
                   build \
                   PRODUCT_NAME="iosApp" \
                   PRODUCT_BUNDLE_IDENTIFIER="com.rvodevelopment.tuinmaat" \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   FRAMEWORK_SEARCH_PATHS="$FULL_PATH" \
                   OTHER_LDFLAGS="-framework ComposeApp -Wl,-undefined,dynamic_lookup" \
                   -derivedDataPath build

    - name: Upload iOS App Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-app-debug
        path: |
          build/Build/Products/Debug-iphonesimulator/*.app
