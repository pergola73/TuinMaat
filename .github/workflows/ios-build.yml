name: iOS Build & Test

on:
  workflow_dispatch:
  push:
    branches: [ "main", "develop", "alpha-version", "master" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        architecture: aarch64
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Fix Gradle Native Libraries
      run: |
        mkdir -p ~/.gradle/native
        find ~/.gradle/native -name "*.jnilib" -exec chmod +x {} + || true

    - name: Create local.properties
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties
        echo "PLANTNET_API_KEY=${{ secrets.PLANTNET_API_KEY }}" >> local.properties

    - name: Setup Firebase iOS Config
      run: |
        mkdir -p iosApp/iosApp/Preview\ Content
        mkdir -p iosApp/Configuration
        echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" > iosApp/iosApp/GoogleService-Info.plist

    - name: Repair Konan Directory
      run: |
        mkdir -p ~/.konan/kotlin-native-prebuilt-macos-aarch64-2.1.0/tools
        touch ~/.konan/kotlin-native-prebuilt-macos-aarch64-2.1.0/tools/env_blacklist
        echo "" > ~/.konan/kotlin-native-prebuilt-macos-aarch64-2.1.0/tools/env_blacklist

    - name: Build Framework
      run: |
        export GRADLE_OPTS="-Dorg.gradle.native=false -Dorg.gradle.daemon=false"
        # Bouw het dynamische framework voor de simulator
        ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 -PskipAndroidApp=true --info > build_log.txt 2>&1 || (
          echo "!!! KOTLIN BUILD FAILED !!!"
          grep -E "^e: |Undefined symbols|ld: " build_log.txt | sort -u
          exit 1
        )
        
        # Bevestig pad voor de volgende stap
        find composeApp/build/bin/iosSimulatorArm64 -name "ComposeApp.framework"

    - name: Build iOS App
      run: |
        FRAMEWORK_PARENT_DIR=$(find composeApp/build/bin/iosSimulatorArm64 -name "debugFramework" -type d | head -n 1)
        FULL_PATH="$(pwd)/$FRAMEWORK_PARENT_DIR"
        echo "Framework location: $FULL_PATH"
        
        # We bouwen met xcodebuild en dwingen de koppeling naar het dynamische framework
        xcodebuild -project iosApp/iosApp.xcodeproj \
                   -scheme iosApp \
                   -sdk iphonesimulator \
                   -configuration Debug \
                   -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
                   build \
                   PRODUCT_NAME="iosApp" \
                   PRODUCT_BUNDLE_IDENTIFIER="com.rvodevelopment.tuinmaat" \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   FRAMEWORK_SEARCH_PATHS="$FULL_PATH" \
                   LD_RUNPATH_SEARCH_PATHS="@executable_path/Frameworks" \
                   OTHER_LDFLAGS="-framework ComposeApp"
