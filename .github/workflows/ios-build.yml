name: iOS Build & Test

on:
  workflow_dispatch:
  push:
    branches: [ "main", "develop", "alpha-version", "master" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        architecture: aarch64
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Create local.properties
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties
        echo "PLANTNET_API_KEY=${{ secrets.PLANTNET_API_KEY }}" >> local.properties

    - name: Setup Firebase iOS Config
      run: |
        mkdir -p iosApp/iosApp/Preview\ Content
        mkdir -p iosApp/Configuration
        echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" > iosApp/iosApp/GoogleService-Info.plist

    - name: Repair Konan Directory
      run: |
        mkdir -p ~/.konan/kotlin-native-prebuilt-macos-aarch64-2.1.0/tools
        touch ~/.konan/kotlin-native-prebuilt-macos-aarch64-2.1.0/tools/env_blacklist
        echo "" > ~/.konan/kotlin-native-prebuilt-macos-aarch64-2.1.0/tools/env_blacklist

    - name: Build Framework and Summarize Errors
      run: |
        export GRADLE_OPTS="-Dorg.gradle.native=false -Dorg.gradle.daemon=false"
        
        # Zoek de juiste taak voor simulator
        echo "Searching for framework tasks..."
        ./gradlew :composeApp:tasks --all | grep -i framework > framework_tasks.txt || true
        
        EXACT_TASK=$(cat framework_tasks.txt | grep "linkDebugFrameworkIosSimulatorArm64" | head -n 1 | awk '{print $1}')
        
        # Voer de build uit en vang alle output op in een tijdelijk bestand
        echo "Starting build with task: ${EXACT_TASK:-assemble}..."
        ./gradlew :composeApp:${EXACT_TASK:-assemble} -PskipAndroidApp=true --info > build_log.txt 2>&1 || (
          echo "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
          echo "!!! BUILD FAILED - KOTLIN COMPILER ERROR SUMMARY !!!"
          echo "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
          # Filter alle regels die met 'e:' beginnen (Kotlin fouten)
          grep "^e: " build_log.txt | sort -u
          echo "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
          # Laat ook de laatste 50 regels zien voor context
          tail -n 50 build_log.txt
          exit 1
        )

    - name: Build iOS App
      run: |
        xcodebuild -project iosApp/iosApp.xcodeproj \
                   -scheme iosApp \
                   -sdk iphonesimulator \
                   -configuration Debug \
                   -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
                   build \
                   PRODUCT_NAME="iosApp" \
                   PRODUCT_BUNDLE_IDENTIFIER="com.rvodevelopment.tuinmaat" \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGN_IDENTITY="" \
                   OTHER_KOTLIN_FLAGS="-PskipAndroidApp=true"
