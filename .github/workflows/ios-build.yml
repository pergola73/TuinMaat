name: iOS Build & Test

on:
  workflow_dispatch:
  push:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Create local.properties
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties
        echo "PLANTNET_API_KEY=${{ secrets.PLANTNET_API_KEY }}" >> local.properties

    - name: Setup Firebase iOS Config
      run: |
        mkdir -p iosApp/iosApp/Preview\ Content
        mkdir -p iosApp/Configuration
        echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" > iosApp/iosApp/GoogleService-Info.plist

    - name: Discovery and Build Kotlin Framework
      run: |
        echo "Searching for available iOS framework tasks..."
        # We zoeken naar de taak die het framework bouwt voor de simulator
        # De naam is meestal assembleComposeAppDebugFrameworkIosSimulatorArm64
        # of assembleDebugFrameworkIosSimulatorArm64
        TASK_NAME=$(./gradlew :composeApp:tasks --all | grep -oE "assemble[a-zA-Z0-9]*DebugFrameworkIosSimulatorArm64" | head -n 1)
        
        if [ -z "$TASK_NAME" ]; then
          echo "Specific task not found, trying fallback: assemble"
          ./gradlew :composeApp:assembleDebug || ./gradlew assemble
        else
          echo "Found task: $TASK_NAME. Starting build..."
          ./gradlew :composeApp:$TASK_NAME
        fi

    - name: Build iOS App
      run: |
        xcodebuild -project iosApp/iosApp.xcodeproj \
                   -scheme iosApp \
                   -sdk iphonesimulator \
                   -configuration Debug \
                   build \
                   PRODUCT_NAME="iosApp" \
                   PRODUCT_BUNDLE_IDENTIFIER="com.rvodevelopment.tuinmaat" \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGN_IDENTITY=""
