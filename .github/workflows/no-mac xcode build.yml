name: iOS Build

on:
  push:
    branches: [ "alpha-version" ]
  pull_request:
    branches: [ "alpha-version" ]

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14 # Gebruik een specifieke versie (macOS 14 heeft Xcode 15)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Install Dependencies (indien nodig)
        run: |
          if [ -f "Podfile" ]; then
            pod install
          fi

      - name: Build for Simulator
        run: |
          # We bouwen voor de simulator omdat je dan geen betaalde Apple Developer licentie/certificaten nodig hebt in je workflow
          xcodebuild build \
            -scheme "Tuinmaat" \
            -workspace "Tuinmaat.xcworkspace" \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
            CODE_SIGNING_ALLOWED=NO
